schema_version: 1

context:
  name: google-cloud-texttospeech
  version: "2.36.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/google_cloud_texttospeech-${{ version }}.tar.gz
  sha256: 6c605af7e4774c1bac99fcaaf4538f152b10bba7738a23f42184557f444dc6b7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - google-api-core >=2.11.0,<3.0.0
    - google-api-core-grpc
    - google-auth >=2.14.1,<3.0.0,!=2.24.0,!=2.25.0
    # more restrictive constraint for python >=3.14
    - grpcio >=1.75.1,<2.0.0
    # more restrictive constraint for python >=3.13
    - proto-plus >=1.25.0,<2.0.0
    - protobuf >=4.25.8,<8.0.0

tests:
  - python:
      imports:
        - grpc
        - google.cloud.texttospeech_v1
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: Google Cloud Texttospeech API client library
  license: Apache-2.0
  license_file: LICENSE
  description: |
    Google Cloud Text-to-Speech API synthesizes natural-sounding speech by applying powerful neural network models.
    See the [quick start guide](https://googleapis.dev/python/texttospeech/latest/index.html#quick-start).

  homepage: https://github.com/googleapis/google-cloud-python
  repository: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-texttospeech
  documentation: https://cloud.google.com/python/docs/reference/texttospeech/latest

extra:
  recipe-maintainers:
    - xylar
    - parthea
